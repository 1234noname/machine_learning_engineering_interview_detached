apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace:  {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: "{{ .Values.image_api.repository }}:{{ .Values.image_api.tag }}{{- if .Values.image_api.digest }}@{{ .Values.image_api.digest }}{{- end }}"
          imagePullPolicy: {{ .Values.image_api.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: avsa-env
                optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-service
spec:
  selector:
    app: api-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
