apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace:  {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: {{ .Values.image_api.repository }}:{{ .Values.image_api.tag | default "latest" }}
          ports:
            - containerPort: 80
          command: ["/app/.venv/bin/fastapi", "run", "api.py", "--port", "8000", "--host", "0.0.0.0"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: api-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
