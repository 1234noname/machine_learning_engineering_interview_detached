services:
  prometheus:
    image: prom/prometheus:v2.53.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:11.1.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/operations.json:/var/lib/grafana/dashboards/operations.json:ro
    ports:
      - "3010:3000"
    depends_on:
      - prometheus
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./toxiproxy.json:/etc/toxiproxy/config.json:ro
    command: ["-config", "/etc/toxiproxy/config.json", "-host", "0.0.0.0"]
    ports:
      - "8474:8474"   # control API — used by E2E tests to add/remove toxics
      - "18081:18081" # batcher proxy (orchestrator routes here; no toxics = passthrough)
