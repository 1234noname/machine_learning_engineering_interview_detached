global:
  scrape_interval: 15s
rule_files:
  - alerts.yml
scrape_configs:
  - job_name: avsa-api
    static_configs:
      - targets: ["host.docker.internal:8080"]
  - job_name: avsa-model
    static_configs:
      # The local-real stack serves the model on :8090 (the batcher took
      # :8000's old slot); this target was stale at :8000 so avsa-model never
      # scraped. The model exposes the prometheus-fastapi-instrumentator series
      # (http_requests_total{handler="/embed"}, http_request_duration_seconds)
      # used by the dashboard's raw-benchmark-path panels.
      - targets: ["host.docker.internal:8090"]
  - job_name: avsa_orchestrator
    static_configs:
      - targets: ["host.docker.internal:9568"]
  - job_name: avsa-batcher
    static_configs:
      - targets: ["host.docker.internal:8081"]
  - job_name: avsa-shopper
    metrics_path: /api/metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
