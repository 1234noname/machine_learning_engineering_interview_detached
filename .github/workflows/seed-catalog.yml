name: Seed catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

# No concurrency group — seeding is idempotent but slow; allow at most one run.
concurrency:
  group: seed-catalog
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  seed:
    name: seed
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: uv sync
        run: uv sync --frozen
      - name: Generate config
        run: uv run python scripts/config-gen.py ci
      - name: Seed catalog
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/seed-catalog.py
