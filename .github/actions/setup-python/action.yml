name: Set up Python via uv
description: Configures uv with caching and syncs dev dependencies.
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Sync dev dependencies
      run: uv sync --dev
      shell: bash
