fail_fast: true
# Fixtures are intentionally violations of their respective hooks. Excluded
# from default scans; verified directly via `tests/fixtures/pre-commit/verify.sh`.
exclude: ^tests/fixtures/pre-commit/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates contain Go-template syntax that isn't valid YAML.
        exclude: ^helm/templates/
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  # mirrors-mypy installs mypy into its own isolated venv with no
  # project deps, so every third-party import shows up as "Cannot find
  # implementation or library stub". Run mypy through the project venv
  # via `uv run` instead. Same `pyproject.toml` config is used either
  # way, so local pre-commit and `uv run mypy` behave identically.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv via uv)
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: false
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.3
    hooks:
      - id: uv-lock
  - repo: https://github.com/google/yamlfmt
    rev: v0.16.0
    hooks:
      - id: yamlfmt
        # Helm templates contain Go-template syntax that isn't valid YAML.
        exclude: ^helm/templates/
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3042, --ignore, DL3006, --failure-threshold, warning]
        exclude: ^apps/[^/]+/(deps|_build)/
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.26
    hooks:
      - id: helmlint
        files: ^helm/
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: lychee
        name: lychee (offline markdown link check)
        entry: lychee --offline --no-progress
        language: system
        files: \.md$
        exclude: ^apps/[^/]+/(deps|_build)/
        pass_filenames: true
      - id: pip-audit
        # CVE scan for Python deps. pre-push stage so it doesn't slow
        # down every commit but DOES run before the network round-trip —
        # catches CVEs locally that would otherwise only surface in CI.
        #
        # Runs against the active venv. CI's `-r requirements.txt`
        # approach won't work locally: pip-audit's -r mode tries to
        # create a fresh venv via `ensurepip`, which fails on uv-managed
        # Python on macOS. Active-venv mode is a functional superset
        # (audits dev-deps too) — a feature, not a bug.
        #
        # Allowlist (single source of truth): .pip-audit-allowlist.toml,
        # consumed by scripts/pip-audit.sh. CI calls the same wrapper.
        name: pip-audit (Python dep CVE scan)
        entry: bash -c 'uv sync --frozen >/dev/null && scripts/pip-audit.sh'
        language: system
        pass_filenames: false
        stages: [pre-push]
